<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歴史能力検定1級 日本史 過去問</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 自前CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light">

<div class="container py-4">

  <!-- ========================= -->
  <!-- ① 設定画面 -->
  <!-- ========================= -->
  <div id="screen-start">

    <h2 class="mb-4">歴史能力検定1級 日本史</h2>

    <!-- 出題年度 -->
    <div class="mb-4">
      <h5>出題年度</h5>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="year" value="all" checked>
        <label class="form-check-label">全年度</label>
      </div>

      <!-- 年度 -->
      <div class="row row-cols-3">
        <!-- JSで生成してもOK -->
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2008">
          <label class="form-check-label">2008</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2009">
          <label class="form-check-label">2009</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2010">
          <label class="form-check-label">2010</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2011">
          <label class="form-check-label">2011</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2012">
          <label class="form-check-label">2012</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2016">
          <label class="form-check-label">2016</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2017">
          <label class="form-check-label">2017</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2018">
          <label class="form-check-label">2018</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2019">
          <label class="form-check-label">2019</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2020">
          <label class="form-check-label">2020</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2021">
          <label class="form-check-label">2021</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2022">
          <label class="form-check-label">2022</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2023">
          <label class="form-check-label">2023</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="year" value="2024">
          <label class="form-check-label">2024</label>
        </div>
      </div>
    </div>

    <!-- 出題形式 -->
    <div class="mb-4">
      <h5>出題形式</h5>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="full" checked>
        <label class="form-check-label">4択20問 記述8問 論述2問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="mid">
        <label class="form-check-label">4択10問 記述4問 論述1問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="small1">
        <label class="form-check-label">4択8問 記述2問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="small2">
        <label class="form-check-label">4択4問 記述1問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="choice5">
        <label class="form-check-label">4択5問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="short8">
        <label class="form-check-label">記述8問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="short4">
        <label class="form-check-label">記述4問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="essay2">
        <label class="form-check-label">論述2問</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="format" value="essay1">
        <label class="form-check-label">論述1問</label>
      </div>

    </div>

    <button id="start-btn" class="btn btn-primary btn-lg w-100">
      開始
    </button>

  </div>

  <!-- ========================= -->
  <!-- ② 出題画面 -->
  <!-- ========================= -->
  <div id="screen-quiz" class="d-none">

    <div class="card bg-secondary">
      <div class="card-body">

        <h5 id="question-counter"></h5>

        <img id="question-image" class="img-fluid mb-3">

        <!-- 論述テキスト -->
        <div id="cloze-text" class="mb-3"></div>

        <!-- 回答エリア -->
        <div id="answer-area"></div>

        <button id="next-btn" class="btn btn-primary btn-lg w-100 mt-3">
          次へ
        </button>

      </div>
    </div>

  </div>

  <!-- ========================= -->
  <!-- ③ 結果画面 -->
  <!-- ========================= -->
  <div id="screen-result" class="d-none">

  <h4 id="score" class="mb-4"></h4>

  <div class="d-flex justify-content-center mb-4">
    <button id="back-to-start-btn" class="btn btn-outline-light btn-lg">
      スタート画面に戻る
    </button>
  </div>

  <!-- PC（表） -->
  <div class="d-none d-md-block">
    <table class="table table-dark table-striped">
      <thead>
        <tr>
          <th>#</th>
          <th>問題</th>
          <th>正解</th>
          <th>あなたの答え</th>
          <th>判定</th>
        </tr>
      </thead>
      <tbody id="result-table"></tbody>
    </table>
  </div>

  <!-- スマホ（カード） -->
  <div class="d-block d-md-none" id="result-cards"></div>

</div>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
