<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#101014">
  <title>歴史能力検定1級 日本史 過去問トレーニング</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=2.2.0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TKL5WQJBSB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TKL5WQJBSB');
  </script>
</head>

<body>
<div class="app">

  <!-- ========================= -->
  <!-- ① 設定画面 -->
  <!-- ========================= -->
  <main id="screen-start" class="screen">
    <header class="app-header">
      <div class="header-row">
        <div>
          <p class="app-eyebrow">HISTORY PROFICIENCY TEST — GRADE 1</p>
          <h1 class="app-title">
            歴史能力検定1級
            <span class="app-title-sub">日本史 過去問トレーニング</span>
          </h1>
        </div>

        <a
          href="https://eikoeigoenglish-star.github.io/rin-japanese-history-2nd-grade/"
          class="switch-link"
        >
          2級へ
          <span aria-hidden="true">→</span>
        </a>
      </div>

      <p class="app-lead">出題年度と問題構成を選んで開始します。</p>
    </header>

    <!-- 出題年度 -->
    <section class="panel" aria-labelledby="year-heading">
      <div class="panel-head">
        <h2 id="year-heading" class="panel-title">出題年度</h2>
        <p class="panel-note">1つ選択</p>
      </div>

      <div class="chip-group year-chip-group" role="radiogroup" aria-labelledby="year-heading">
        <input type="radio" id="year-all" name="year" value="all" checked>
        <label class="chip chip-wide" for="year-all">全年度</label>

        <input type="radio" id="year-2008" name="year" value="2008">
        <label class="chip" for="year-2008">2008</label>

        <input type="radio" id="year-2009" name="year" value="2009">
        <label class="chip" for="year-2009">2009</label>

        <input type="radio" id="year-2010" name="year" value="2010">
        <label class="chip" for="year-2010">2010</label>

        <input type="radio" id="year-2011" name="year" value="2011">
        <label class="chip" for="year-2011">2011</label>

        <input type="radio" id="year-2012" name="year" value="2012">
        <label class="chip" for="year-2012">2012</label>

        <input type="radio" id="year-2016" name="year" value="2016">
        <label class="chip" for="year-2016">2016</label>

        <input type="radio" id="year-2017" name="year" value="2017">
        <label class="chip" for="year-2017">2017</label>

        <input type="radio" id="year-2018" name="year" value="2018">
        <label class="chip" for="year-2018">2018</label>

        <input type="radio" id="year-2019" name="year" value="2019">
        <label class="chip" for="year-2019">2019</label>

        <input type="radio" id="year-2020" name="year" value="2020">
        <label class="chip" for="year-2020">2020</label>

        <input type="radio" id="year-2021" name="year" value="2021">
        <label class="chip" for="year-2021">2021</label>

        <input type="radio" id="year-2022" name="year" value="2022">
        <label class="chip" for="year-2022">2022</label>

        <input type="radio" id="year-2023" name="year" value="2023">
        <label class="chip" for="year-2023">2023</label>

        <input type="radio" id="year-2024" name="year" value="2024">
        <label class="chip" for="year-2024">2024</label>
      </div>
    </section>

    <!-- 出題形式 -->
    <section class="panel" aria-labelledby="format-heading">
      <div class="panel-head">
        <h2 id="format-heading" class="panel-title">出題形式</h2>
        <p class="panel-note">1つ選択</p>
      </div>
      <p class="panel-desc">本番型から1問だけの確認まで、学習時間に合わせて選べます。</p>

      <div class="format-list" role="radiogroup" aria-labelledby="format-heading">
        <input type="radio" id="format-full" name="format" value="full" checked>
        <label class="format-option" for="format-full">
          <span class="format-title">本番型 30問</span>
          <span class="format-detail">4択20問・記述8問・論述2問</span>
        </label>

        <input type="radio" id="format-mid" name="format" value="mid">
        <label class="format-option" for="format-mid">
          <span class="format-title">標準 15問</span>
          <span class="format-detail">4択10問・記述4問・論述1問</span>
        </label>

        <input type="radio" id="format-small1" name="format" value="small1">
        <label class="format-option" for="format-small1">
          <span class="format-title">短時間 10問</span>
          <span class="format-detail">4択8問・記述2問</span>
        </label>

        <input type="radio" id="format-small2" name="format" value="small2">
        <label class="format-option" for="format-small2">
          <span class="format-title">ミニ 5問</span>
          <span class="format-detail">4択4問・記述1問</span>
        </label>

        <input type="radio" id="format-choice5" name="format" value="choice5">
        <label class="format-option" for="format-choice5">
          <span class="format-title">4択 5問</span>
          <span class="format-detail">選択問題だけを素早く確認</span>
        </label>

        <input type="radio" id="format-short8" name="format" value="short8">
        <label class="format-option" for="format-short8">
          <span class="format-title">記述 8問</span>
          <span class="format-detail">語句を自力で思い出す練習</span>
        </label>

        <input type="radio" id="format-short4" name="format" value="short4">
        <label class="format-option" for="format-short4">
          <span class="format-title">記述 4問</span>
          <span class="format-detail">軽めのアウトプット練習</span>
        </label>

        <input type="radio" id="format-essay2" name="format" value="essay2">
        <label class="format-option" for="format-essay2">
          <span class="format-title">論述 2問</span>
          <span class="format-detail">空欄を埋めて論述問題を確認</span>
        </label>

        <input type="radio" id="format-choice1" name="format" value="choice1">
        <label class="format-option" for="format-choice1">
          <span class="format-title">4択 1問</span>
          <span class="format-detail">一問だけ運試し</span>
        </label>

        <input type="radio" id="format-short1" name="format" value="short1">
        <label class="format-option" for="format-short1">
          <span class="format-title">記述 1問</span>
          <span class="format-detail">一語だけ思い出す</span>
        </label>

        <input type="radio" id="format-essay1" name="format" value="essay1">
        <label class="format-option" for="format-essay1">
          <span class="format-title">論述 1問</span>
          <span class="format-detail">一題だけ腰を据えて確認</span>
        </label>
      </div>
    </section>

    <div id="start-error" class="alert" role="alert" hidden></div>

    <button id="start-btn" type="button" class="btn-primary btn-block">開始する</button>
  </main>

  <!-- ========================= -->
  <!-- ② 出題画面 -->
  <!-- ========================= -->
  <main id="screen-quiz" class="screen" hidden>
    <div class="quiz-top">
      <p id="question-meta" class="quiz-meta"></p>
      <p id="question-counter" class="quiz-counter" aria-live="polite"></p>
    </div>

    <div
      class="progress"
      role="progressbar"
      aria-label="進捗"
      aria-valuemin="0"
      aria-valuemax="100"
      aria-valuenow="0"
      id="progress-bar"
    >
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <article class="panel quiz-panel">
      <img id="question-image" class="question-image" alt="問題画像">

      <div id="cloze-text" class="cloze-text"></div>

      <div id="answer-area" class="answer-area"></div>

      <p id="quiz-hint" class="quiz-hint" aria-hidden="true"></p>

      <button id="next-btn" type="button" class="btn-primary btn-block" disabled>次へ</button>
    </article>
  </main>

  <!-- ========================= -->
  <!-- ③ 結果画面 -->
  <!-- ========================= -->
  <main id="screen-result" class="screen" hidden>
    <header class="result-head">
      <p class="app-eyebrow">RESULT</p>
      <h2 class="panel-title-lg">結果</h2>
    </header>

    <section class="panel score-panel" aria-labelledby="score">
      <p id="score" class="score-line"></p>
      <div class="score-detail">
        <p id="score-percent" class="score-percent"></p>
        <p id="score-sub" class="score-sub"></p>
      </div>
    </section>

    <section aria-label="各問題の結果">
      <ol id="result-list" class="result-list"></ol>
    </section>

    <button id="back-to-start-btn" type="button" class="btn-secondary btn-block">
      スタート画面に戻る
    </button>
  </main>

  <footer class="app-footer">
    <p>歴史能力検定1級 日本史 過去問トレーニング</p>
  </footer>
</div>

<script src="app.js?v=2.1.0"></script>
</body>
</html>
